<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario - The Mago's</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <nav class="sidebar">
            <div class="sidebar-header">
                <h1 class="logo">THE MAGO'S</h1>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link"><i class="fas fa-chart-line"></i> Dashboard</a></li>
                <li><a href="pos.html" class="nav-link"><i class="fas fa-cash-register"></i> POS Terminal</a></li>
                <li><a href="clientes.html" class="nav-link"><i class="fas fa-users"></i> Clientes</a></li>
                <li><a href="inventory.html" class="nav-link active"><i class="fas fa-box"></i> Inventario</a></li>
            </ul>
        </nav>

        <main class="main-content">
            <header class="top-header">
                <h2>Inventario</h2>
            </header>

            <div class="inventory-container">
                <form class="inventory-form" id="productForm">
                    <div class="form-grid">
                        <input type="text" id="productName" class="search-input" placeholder="Nombre del producto" required>
                        <input type="number" id="productPrice" class="search-input" placeholder="Precio" min="0" step="0.01" required>
                        <input type="number" id="productStock" class="search-input" placeholder="Stock" min="0" step="1" required>
                        <input type="text" id="productCategory" class="search-input" placeholder="Categoria" required>
                        <button type="submit" class="btn-new-appointment"><i class="fas fa-plus"></i> Registrar Producto</button>
                    </div>
                </form>

                <div class="inventory-filters">
                    <input type="search" placeholder="Buscar producto..." class="search-input" id="searchInput">
                    <select id="categoryFilter" class="filter-select">
                        <option value="">Todas las CategorÃ­as</option>
                        <option value="Grooming">Grooming</option>
                        <option value="Tools">Herramientas</option>
                        <option value="Otros">Otros</option>
                    </select>
                </div>

                <div class="inventory-table">
                    <table>
                        <thead>
                            <tr>
                                <th>Producto</th>
                                <th>Categoria</th>
                                <th>Precio</th>
                                <th>Stock</th>
                                <th>Estado</th>
                                <th>Acción</th>
                                
                            </tr>
                        </thead>
                        <tbody id="inventoryTableBody">
                            <!-- Se llena dinÃ¡micamente -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="js/app-firebase.js"></script>
</body>
</html>
