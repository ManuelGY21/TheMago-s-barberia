<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Terminal - The Mago's</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <nav class="sidebar">
            <div class="sidebar-header">
                <h1 class="logo">THE MAGO'S</h1>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link"><i class="fas fa-chart-line"></i> Dashboard</a></li>
                <li><a href="pos.html" class="nav-link active"><i class="fas fa-cash-register"></i> POS Terminal</a></li>
                <li><a href="clientes.html" class="nav-link"><i class="fas fa-users"></i> Clientes</a></li>
                <li><a href="inventory.html" class="nav-link"><i class="fas fa-box"></i> Inventario</a></li>
            </ul>
        </nav>

        <main class="main-content">
            <div class="pos-container">
                <div class="pos-left">
                    <h2>Terminal</h2>
                    <p>Select items to add to ticket</p>

                    <!-- Services Section -->
                    <div class="pos-section">
                        <h3><i class="fas fa-cut"></i> SERVICIOS</h3>
                        <div class="items-grid" id="servicesGrid">
                            <!-- Se llena dinámicamente con JS -->
                        </div>
                    </div>

                    <!-- Merchandise Section -->
                    <div class="pos-section">
                        <h3><i class="fas fa-shopping-bag"></i> MERCADERÍA</h3>
                        <div class="items-grid" id="productsGrid">
                            <!-- Se llena dinámicamente con JS -->
                        </div>
                    </div>
                </div>

                <div class="pos-right">
                    <div class="current-ticket">
                        <h3>Current Ticket</h3>
                        <p class="ticket-info">Ticket #8492 • Mateo R.</p>
                        
                        <div class="ticket-items" id="ticketItems">
                            <!-- Items se agregan dinámicamente -->
                        </div>

                        <div class="ticket-summary">
                            <div class="summary-row total">
                                <span>TOTAL</span>
                                <span id="total">S/ 0.00</span>
                            </div>
                        </div>

                        <div class="payment-methods">
                            <button class="btn-payment yape" onclick="procesarPago('YAPE')">Yape</button>
                            <button class="btn-payment plin" onclick="procesarPago('PLIN')">Plin</button>
                            <button class="btn-payment efectivo" onclick="procesarPago('EFECTIVO')">EFECTIVO</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="js/app-firebase.js"></script>
</body>
</html>
